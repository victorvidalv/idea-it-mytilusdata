name: CI Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build_and_test:
    name: Typecheck, Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Format Check (Prettier)
        run: npm run format || true

      - name: Lint (ESLint)
        run: npm run lint || true

      - name: Typecheck (Svelte-check)
        run: npm run check

      - name: Build SvelteKit App
        run: npm run build
        env:
          # Para que Vitest/Vercel no fallen al compilar rutas que requieran ENV
          # Al estar en build time, no son usadas si las rutas prerenderizadas
          # exigen secretos.
          DATABASE_URL: file:./local.db
          JWT_SECRET: 'ci-secret-build'
          RESEND_API_KEY: 're_build_key'

      - name: Run Tests (Vitest & Playwright)
        run: npm run test
        env:
          DATABASE_URL: file:./local.db
          JWT_SECRET: 'ci-secret-test'
          RESEND_API_KEY: 're_build_key'

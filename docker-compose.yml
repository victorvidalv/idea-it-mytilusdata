services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/mediciones.db
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
      - API_PUBLIC_TOKEN=${API_PUBLIC_TOKEN:-public-api-token-here}
    volumes:
      # Persistir base de datos SQLite
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  sqlite_data:
    driver: local

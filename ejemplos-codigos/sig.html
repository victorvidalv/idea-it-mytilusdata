<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador Sigmoide v1.2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .header {
            background-color: #0f172a;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 {
            color: #f1f5f9;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h2 svg {
            color: #60a5fa;
        }

        .mode-badge {
            font-size: 12px;
            color: #94a3b8;
            font-family: 'Courier New', monospace;
        }

        .content {
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 1024px) {
            .content {
                grid-template-columns: 2fr 1fr;
            }
        }

        .chart-container {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 16px;
            position: relative;
        }

        .chart-container svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 1px 2px rgb(0 0 0 / 0.1));
        }

        .controls-panel {
            background: white;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .controls-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 8px;
        }

        .controls-header h3 {
            font-weight: bold;
            color: #334155;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group.highlight {
            background-color: #eff6ff;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #dbeafe;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .control-label.highlight {
            color: #1e40af;
            font-weight: bold;
        }

        .control-label span {
            font-family: 'Courier New', monospace;
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #bfdbfe;
            color: #1e40af;
        }

        .control-label span.normal {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            color: #1e293b;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            background: #cbd5e1;
            border-radius: 4px;
            appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #64748b;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"].accent-blue::-webkit-slider-thumb {
            background: #2563eb;
        }

        .control-description {
            font-size: 10px;
            color: #2563eb;
            line-height: 1.2;
        }

        .divider {
            border-top: 1px solid #f1f5f9;
            margin: 8px 0;
        }

        .thresholds-section h4 {
            font-weight: bold;
            color: #334155;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .thresholds-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .threshold-input {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .threshold-input label {
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .threshold-input label.green {
            color: #15803d;
        }

        .threshold-input label.red {
            color: #b91c1c;
        }

        .threshold-input input {
            width: 100%;
            padding: 4px;
            font-size: 14px;
            border: 1px solid #bbf7d0;
            border-radius: 4px;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .threshold-input input.red {
            border-color: #fecaca;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                VISUALIZADOR_SIGMOIDE__V1.2
            </h2>
            <span class="mode-badge">MODO: INTERVALOS</span>
        </div>

        <div class="content">
            <div class="chart-container">
                <svg id="sigmoidChart" viewBox="0 0 800 400"></svg>
            </div>

            <div class="controls-panel">
                <div class="controls-header">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <h3>Ajuste de Modelo</h3>
                </div>

                <div class="control-group highlight">
                    <div class="control-label highlight">
                        <label>
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg>
                            Intervalo (±)
                        </label>
                        <span id="marginErrorValue">5%</span>
                    </div>
                    <input 
                        type="range" 
                        id="marginError"
                        min="0.01" 
                        max="0.20" 
                        step="0.01" 
                        value="0.05"
                        class="accent-blue"
                    />
                    <p class="control-description">Define el ancho del carril de estimación alrededor de la curva ideal.</p>
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <label>Pendiente (k)</label>
                        <span id="steepnessValue" class="normal">1.0</span>
                    </div>
                    <input 
                        type="range" 
                        id="steepness"
                        min="0.1" 
                        max="5" 
                        step="0.1" 
                        value="1"
                    />
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <label>Desplazamiento (t0)</label>
                        <span id="offsetValue" class="normal">0.0</span>
                    </div>
                    <input 
                        type="range" 
                        id="offset"
                        min="-5" 
                        max="5" 
                        step="0.1" 
                        value="0"
                    />
                </div>

                <div class="divider"></div>

                <div class="thresholds-section">
                    <h4>
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 3 21 3 21 9"></polyline>
                            <polyline points="9 21 3 21 3 15"></polyline>
                            <line x1="21" y1="3" x2="14" y2="10"></line>
                            <line x1="3" y1="21" x2="10" y2="14"></line>
                        </svg>
                        Zonas Límite
                    </h4>
                    
                    <div class="thresholds-grid">
                        <div class="threshold-input">
                            <label class="green">Max (Saturación)</label>
                            <input 
                                type="number" 
                                id="thresholdHigh"
                                step="0.05"
                                max="0.99"
                                value="0.8"
                            />
                        </div>
                        <div class="threshold-input">
                            <label class="red">Min (Inactivo)</label>
                            <input 
                                type="number" 
                                id="thresholdLow"
                                step="0.05"
                                min="0.01"
                                value="0.2"
                            />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State
        let steepness = 1;
        let offset = 0;
        let thresholdHigh = 0.8;
        let thresholdLow = 0.2;
        let marginError = 0.05;
        let timeRange = 10;

        // SVG configuration
        const width = 800;
        const height = 400;
        const padding = 40;

        // Sigmoid function
        function sigmoid(x, k, x0) {
            return 1 / (1 + Math.exp(-k * (x - x0)));
        }

        // Generate chart data
        function generateChartData() {
            const pointsLine = [];
            const pointsUpper = [];
            const pointsLower = [];

            const step = timeRange / 100;
            const startX = -timeRange / 2;

            for (let x = startX; x <= timeRange / 2; x += step) {
                const yBase = sigmoid(x, steepness, offset);
                const svgX = ((x - startX) / timeRange) * (width - 2 * padding) + padding;
                const svgY = height - padding - (yBase * (height - 2 * padding));
                
                const yUp = Math.min(1, yBase + marginError);
                const yDown = Math.max(0, yBase - marginError);
                const svgYUp = height - padding - (yUp * (height - 2 * padding));
                const svgYDown = height - padding - (yDown * (height - 2 * padding));

                pointsLine.push(`${svgX},${svgY}`);
                pointsUpper.push(`${svgX},${svgYUp}`);
                pointsLower.unshift(`${svgX},${svgYDown}`);
            }

            const area = [...pointsUpper, ...pointsLower].join(' ');

            return {
                linePoints: pointsLine.join(' '),
                areaPoints: area
            };
        }

        // Get Y position for a value
        function getYPos(val) {
            return height - padding - (val * (height - 2 * padding));
        }

        // Render chart
        function renderChart() {
            const svg = document.getElementById('sigmoidChart');
            const { linePoints, areaPoints } = generateChartData();
            
            const yHigh = getYPos(thresholdHigh);
            const yLow = getYPos(thresholdLow);
            const yCenter = getYPos(0.5);

            svg.innerHTML = `
                <!-- Fondos de Zona -->
                <rect x="${padding}" y="${padding}" width="${width - 2 * padding}" height="${yHigh - padding}" fill="rgba(16, 185, 129, 0.05)" />
                <rect x="${padding}" y="${yLow}" width="${width - 2 * padding}" height="${height - padding - yLow}" fill="rgba(239, 68, 68, 0.05)" />

                <!-- Grid Básico -->
                <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#cbd5e1" stroke-width="2" />
                <line x1="${padding}" y1="${padding}" x2="${padding}" y2="${height - padding}" stroke="#cbd5e1" stroke-width="2" />
                
                <!-- Líneas de Referencia -->
                <line x1="${padding}" y1="${yHigh}" x2="${width - padding}" y2="${yHigh}" stroke="#10b981" stroke-width="1" stroke-dasharray="4,4" />
                <text x="${width - padding - 10}" y="${yHigh - 5}" text-anchor="end" font-size="10" fill="#15803d" font-family="monospace" font-weight="bold">UMBRAL_MAX</text>

                <line x1="${padding}" y1="${yLow}" x2="${width - padding}" y2="${yLow}" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,4" />
                <text x="${width - padding - 10}" y="${yLow + 12}" text-anchor="end" font-size="10" fill="#b91c1c" font-family="monospace" font-weight="bold">UMBRAL_MIN</text>

                <!-- INTERVALO DE TOLERANCIA -->
                <polygon 
                    points="${areaPoints}" 
                    fill="rgba(37, 99, 235, 0.2)" 
                    stroke="none"
                />

                <!-- Curva Central -->
                <polyline 
                    points="${linePoints}" 
                    fill="none" 
                    stroke="#2563eb" 
                    stroke-width="3" 
                    stroke-linecap="round" 
                    stroke-linejoin="round"
                />

                <!-- Eje Central 0.5 -->
                <line x1="${padding}" y1="${yCenter}" x2="${width - padding}" y2="${yCenter}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2" />

                <!-- Etiquetas Ejes -->
                <text x="${width / 2}" y="${height - 10}" text-anchor="middle" font-size="14" fill="#64748b" font-family="monospace">TIEMPO (t)</text>
                <text x="15" y="${height / 2}" text-anchor="middle" transform="rotate(-90, 15, ${height / 2})" font-size="14" fill="#64748b" font-family="monospace">MAGNITUD (y)</text>
            `;
        }

        // Update display values
        function updateDisplayValues() {
            document.getElementById('marginErrorValue').textContent = (marginError * 100).toFixed(0) + '%';
            document.getElementById('steepnessValue').textContent = steepness.toFixed(1);
            document.getElementById('offsetValue').textContent = offset.toFixed(1);
        }

        // Event listeners
        document.getElementById('marginError').addEventListener('input', (e) => {
            marginError = parseFloat(e.target.value);
            updateDisplayValues();
            renderChart();
        });

        document.getElementById('steepness').addEventListener('input', (e) => {
            steepness = parseFloat(e.target.value);
            updateDisplayValues();
            renderChart();
        });

        document.getElementById('offset').addEventListener('input', (e) => {
            offset = parseFloat(e.target.value);
            updateDisplayValues();
            renderChart();
        });

        document.getElementById('thresholdHigh').addEventListener('input', (e) => {
            thresholdHigh = parseFloat(e.target.value);
            renderChart();
        });

        document.getElementById('thresholdLow').addEventListener('input', (e) => {
            thresholdLow = parseFloat(e.target.value);
            renderChart();
        });

        // Initial render
        renderChart();
    </script>
</body>
</html>
